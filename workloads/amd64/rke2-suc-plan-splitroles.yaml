apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: rke2-server-cp
  namespace: system-upgrade
  labels:
    rke2-upgrade: server
spec:
  jobActiveDeadlineSecs: 1500 # Don't let the job run for more than 25 mins
  concurrency: 1
  version: $UPGRADEVERSION
  nodeSelector:
    matchExpressions:
      - {key: node-role.kubernetes.io/control-plane, operator: In, values: ["true"]}
  tolerations:
    - operator: Exists
  serviceAccountName: system-upgrade
  cordon: true
  drain:
    force: true
    skipWaitForDeleteTimeout: 30 # Don't wait forever for pods to exit
    timeout: 300s                # Force the drain to give up after 5 mins
  upgrade:
    image: rancher/rke2-upgrade
---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: rke2-server-etcd
  namespace: system-upgrade
  labels:
    rke2-upgrade: server
spec:
  jobActiveDeadlineSecs: 1500 # Don't let the job run for more than 25 mins
  concurrency: 1
  version: $UPGRADEVERSION
  nodeSelector:
    matchExpressions:
      - {key: node-role.kubernetes.io/etcd, operator: In, values: ["true"]}
      - {key: node-role.kubernetes.io/control-plane, operator: NotIn, values: ["true"]}
  tolerations:
    - operator: Exists
  serviceAccountName: system-upgrade
  prepare:
    image: rancher/rke2-upgrade
    args: ["prepare", "rke2-server-cp"]
  cordon: true
  drain:
    force: true
    skipWaitForDeleteTimeout: 30 # Don't wait forever for pods to exit
    timeout: 300s                # Force the drain to give up after 5 mins
  upgrade:
    image: rancher/rke2-upgrade
---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: rke2-agent
  namespace: system-upgrade
  labels:
    rke2-upgrade: agent
spec:
  jobActiveDeadlineSecs: 1500 # Don't let the job run for more than 25 mins
  concurrency: 2
  version: $UPGRADEVERSION
  nodeSelector:
    matchExpressions:
      - {key: node-role.kubernetes.io/etcd, operator: NotIn, values: ["true"]}
      - {key: node-role.kubernetes.io/control-plane, operator: NotIn, values: ["true"]}
  serviceAccountName: system-upgrade
  prepare:
    image: rancher/rke2-upgrade
    args: ["prepare", "rke2-server-etcd"]
  drain:
    force: true
    skipWaitForDeleteTimeout: 30 # Don't wait forever for pods to exit
    timeout: 300s                # Force the drain to give up after 5 mins
  upgrade:
    image: rancher/rke2-upgrade
